<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Redacted] Hub</title>
    <style>
        :root {
            --bg-dark: #07060b;
            --bg-nav: #0d0b14;
            --card-purple: #130f22;
            --neon-glow: #8a2be2;
            --accent-purple: #a855f7;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Header Navbar */
        header {
            width: 100%;
            background-color: rgba(13, 11, 20, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            padding: 1rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-logo {
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: var(--text-white);
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon-glow);
        }

        .top-nav-home {
            font-family: 'Segoe UI', sans-serif;
            color: var(--accent-purple);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Main Hero Hub Container */
        .hub-container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            padding: 4rem 2rem;
            margin-top: 2rem;
            flex-grow: 1;
        }

        .badge {
            display: inline-block;
            font-family: 'Segoe UI', sans-serif;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid var(--neon-glow);
            color: var(--accent-purple);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
        }

        .main-title {
            font-size: 5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .subtitle {
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-gray);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            word-spacing: 2px;
        }

        /* Text Navigation Bar */
        .tab-navigation {
            display: inline-flex;
            background: rgba(19, 15, 34, 0.8);
            border: 1px solid rgba(138, 43, 226, 0.2);
            padding: 0.4rem;
            border-radius: 12px;
            gap: 0.4rem;
            backdrop-filter: blur(5px);
            margin-bottom: 4rem;
            min-width: 400px;
            justify-content: center;
        }

        .tab-btn {
            font-family: 'Segoe UI', sans-serif;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-gray);
            padding: 0.8rem 1.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            flex: 1;
            text-align: center;
        }

        .tab-btn.active {
            background: rgba(138, 43, 226, 0.25);
            color: var(--text-white);
            border: 1px solid var(--neon-glow);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }

        .tab-btn:hover:not(.active) {
            color: var(--text-white);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Dynamic Content Sections */
        .tab-content {
            display: none; 
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active-content {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-headline {
            font-size: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .section-description {
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-gray);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Dashboard Play Display Frame */
        .display-showcase {
            background: var(--card-purple);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            margin: 0 auto 3rem;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .showcase-footer {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
            text-align: left;
        }

        .showcase-title h3 {
            font-size: 1.2rem;
            color: var(--text-white);
        }

        .showcase-title p {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .showcase-controls {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a855f7 0%, #8a2be2 100%);
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            transition: 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.03);
        }

        /* Responsive Arcade Grid */
        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .media-poster-card {
            background: var(--card-purple);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-gray);
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            padding: 1rem;
            text-align: center;
        }

        .media-poster-card:hover {
            border-color: var(--neon-glow);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
            color: white;
            transform: translateY(-2px);
        }

        .media-poster-card span {
            font-size: 0.8rem;
            color: var(--accent-purple);
            margin-top: 0.4rem;
            font-weight: normal;
        }

        /* Full Screen Overlay Drawer for the 100+ Game Library */
        .library-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 6, 11, 0.98);
            z-index: 2000;
            display: none;
            overflow-y: auto;
            padding: 4rem 2rem;
            animation: fadeIn 0.3s ease;
        }

        .library-content {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .close-library-btn {
            position: absolute;
            top: 2rem;
            right: 4rem;
            background: transparent;
            border: 1px solid var(--neon-glow);
            color: var(--text-white);
            font-size: 1rem;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.2s;
        }

        .close-library-btn:hover {
            background: rgba(138, 43, 226, 0.2);
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 0.8rem 1.5rem;
            background: #130f22;
            border: 1px solid rgba(138, 43, 226, 0.4);
            border-radius: 8px;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1rem;
            margin-bottom: 3rem;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
        }

        /* Layout grids for streaming content dashboards */
        .placeholder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            max-width: 800px;
        margin: 0 auto;
            }

        footer {
            width: 100%;
            text-align: center;
            padding: 2rem;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-gray);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 4rem;
            }
