<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Redacted] Hub</title>
    <!-- FontAwesome for the clean dashboard icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-dark: #07060b;
            --bg-nav: #0d0b14;
            --card-purple: #130f22;
            --neon-glow: #8a2be2;
            --neon-cyan: #00f2fe;
            --accent-purple: #a855f7;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(180deg, rgba(13,11,20,0.6) 0%, rgba(7,6,11,1) 100%), 
                              url('https://unsplash.com'); /* Subtle city/abstract backdrop */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Header Navbar */
        header {
            width: 100%;
            background-color: rgba(13, 11, 20, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            padding: 1rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-logo {
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: var(--text-white);
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon-glow);
        }

        .top-nav-home {
            font-family: 'Segoe UI', sans-serif;
            color: var(--accent-purple);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Main Hero Hub Container */
        .hub-container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            padding: 4rem 2rem;
            margin-top: 2rem;
        }

        .badge {
            display: inline-block;
            font-family: 'Segoe UI', sans-serif;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid var(--neon-glow);
            color: var(--accent-purple);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
        }

        .main-title {
            font-size: 5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .subtitle {
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-gray);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            word-spacing: 2px;
        }

        /* Centralized Tab Navigation Buttons */
        .tab-navigation {
            display: inline-flex;
            background: rgba(19, 15, 34, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.5rem;
            border-radius: 12px;
            gap: 0.5rem;
            backdrop-filter: blur(5px);
            margin-bottom: 4rem;
        }

        .tab-btn {
            font-family: 'Segoe UI', sans-serif;
            background: transparent;
            border: none;
            color: var(--text-gray);
            padding: 0.7rem 1.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.3s ease;
        }

        .tab-btn i {
            font-size: 1.1rem;
        }

        /* Active Tab Styling matching your reference image */
        .tab-btn.active {
            background: rgba(138, 43, 226, 0.25);
            color: var(--text-white);
            border: 1px solid var(--neon-glow);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }

        .tab-btn:hover:not(.active) {
            color: var(--text-white);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Dynamic Content Sections */
        .tab-content {
            display: none; /* Hidden by default, toggled via JS */
            animation: fadeIn 0.5s ease forwards;
        }

        .tab-content.active-content {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Centralized Category Icon Layout */
        .center-icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: rgba(138, 43, 226, 0.15);
            border: 2px solid var(--neon-glow);
            border-radius: 20px;
            font-size: 2.2rem;
            color: var(--accent-purple);
            margin-bottom: 1.5rem;
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.4);
        }

        .section-headline {
            font-size: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .section-description {
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-gray);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Dashboard Play Display Frame */
        .display-showcase {
            background: var(--card-purple);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            margin: 0 auto;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Clean 16:9 widescreen ratio */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .showcase-footer {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
            text-align: left;
        }

        .showcase-title h3 {
            font-size: 1.2rem;
            color: var(--text-white);
        }

        .showcase-title p {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        /* Action Buttons */
        .action-btn {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a855f7 0%, #8a2be2 100%);
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            transition: 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(138, 43, 226, 0.6);
        }

        /* Placeholder layouts for movies/shows dashboards */
        .placeholder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .media-poster-card {
            background: var(--card-purple);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-gray);
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .media-poster-card:hover {
            border-color: var(--neon-glow);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
            color: white;
        }

        .media-poster-card i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--accent-purple);
        }
    </style>
</head>
<body>

    </header>
